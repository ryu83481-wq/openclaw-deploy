<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw 一键部署</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1e293b;border-radius:16px;padding:40px;max-width:500px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
h1{text-align:center;font-size:28px;margin-bottom:6px}
h1 span{color:#ef0011}
.sub{text-align:center;color:#94a3b8;margin-bottom:30px;font-size:13px}
.os-tag{display:block;text-align:center;padding:6px 0;margin-bottom:20px;font-size:12px;color:#64748b;border:1px solid #334155;border-radius:8px}
label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#cbd5e1}
.fg{margin-bottom:16px}
input{width:100%;padding:12px 14px;border:2px solid #334155;border-radius:8px;background:#0f172a;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .2s}
input:focus{border-color:#ef0011}
input::placeholder{color:#475569}
.btn{width:100%;padding:16px;border:none;border-radius:10px;background:linear-gradient(135deg,#ef0011,#ff4444);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .2s;box-shadow:0 4px 20px rgba(239,0,17,.3)}
.btn:hover{opacity:.9}
.msg{text-align:center;margin-top:12px;font-size:13px;min-height:18px}
.msg.ok{color:#4ade80}.msg.err{color:#f87171}
.guide{margin-top:16px;background:#0f172a;border-radius:10px;padding:16px;border:1px solid #334155;display:none}
.guide h3{font-size:14px;margin-bottom:10px;color:#ef0011}
.guide ol{padding-left:18px;font-size:13px;line-height:2.2;color:#cbd5e1}
.tip{color:#94a3b8;font-size:12px;margin-top:8px;line-height:1.6}
.cmd-box{display:flex;align-items:center;gap:8px;margin:10px 0;background:#1e293b;border-radius:8px;padding:12px 14px;font-family:monospace;font-size:12px;color:#4ade80;word-break:break-all;line-height:1.5}
.cmd-box button{flex-shrink:0;padding:6px 12px;border:1px solid #475569;border-radius:6px;background:#334155;color:#e2e8f0;cursor:pointer;font-size:12px}
.cmd-box button:hover{background:#475569}
</style>
</head>
<body>
<div class="card">
  <h1>🦞 OpenClaw <span>一键部署</span></h1>
  <p class="sub">填好 Key，复制命令到终端，全自动安装+配置</p>
  <p class="os-tag" id="osTag"></p>
  <div class="fg">
    <label>Anthropic API Key</label>
    <input type="password" id="antkey" placeholder="sk-ant-...">
  </div>
  <div class="fg">
    <label>Codex API Key <span style="color:#475569;font-weight:400">（可选）</span></label>
    <input type="password" id="codexkey" placeholder="输入 Codex Key">
  </div>
  <div class="fg">
    <label>中转地址 <span style="color:#475569;font-weight:400">（可选）</span></label>
    <input type="text" id="baseurl" placeholder="例如 https://api.example.com">
  </div>
  <button class="btn" onclick="generate()">🚀 一键部署</button>
  <p id="msg" class="msg"></p>
  <div id="guide" class="guide"></div>
</div>
<script>
var isMac=/Mac/.test(navigator.platform);
document.getElementById('osTag').textContent=isMac?'🍎 检测到 macOS':'🪟 检测到 Windows';
function copyCmd(btn){var t=document.getElementById('mac-cmd').textContent;navigator.clipboard.writeText(t);btn.textContent='已复制!';setTimeout(function(){btn.textContent='复制'},2000)}
function genMac(antKey,codexKey,base){
  var s=[
    '#!/bin/bash',
    'echo ""',
    'echo "========================================"',
    'echo "  OpenClaw 一键部署 (macOS)"',
    'echo "========================================"',
    'echo ""',
    '',
    '# 先设环境变量，安装脚本可能会读取',
    'export ANTHROPIC_API_KEY="'+antKey+'"',
  ];
  if(codexKey) s.push('export CODEX_API_KEY="'+codexKey+'"');
  if(base) s.push('export ANTHROPIC_BASE_URL="'+base+'"');
  s=s.concat([
    '',
    'echo "[1/4] 安装 OpenClaw..."',
    'curl -fsSL https://openclaw.ai/install.sh | bash',
    'source ~/.zshrc 2>/dev/null; source ~/.bashrc 2>/dev/null',
    'export PATH="$HOME/.local/bin:$HOME/.openclaw/bin:/usr/local/bin:$PATH"',
    'echo "  完成"',
    'echo ""',
    '',
    'echo "[2/4] 写入环境变量到 shell 配置..."',
    'PROFILE="$HOME/.zshrc"',
    '[ -f "$PROFILE" ] || PROFILE="$HOME/.bashrc"',
    '# 清理旧的错误配置',
    'sed -i.bak "/OPENAI_API_KEY/d" "$PROFILE" 2>/dev/null',
    'sed -i.bak "/OPENAI_API_BASE_URL/d" "$PROFILE" 2>/dev/null',
    '# 写入正确的环境变量',
    'echo >> "$PROFILE"',
    'echo \'# OpenClaw API 配置\' >> "$PROFILE"',
    'echo \'export ANTHROPIC_API_KEY="'+antKey+'"\' >> "$PROFILE"',
  ]);
  if(codexKey) s.push('echo \'export CODEX_API_KEY="'+codexKey+'"\' >> "$PROFILE"');
  if(base) s.push('echo \'export ANTHROPIC_BASE_URL="'+base+'"\' >> "$PROFILE"');
  s=s.concat([
    'source "$PROFILE"',
    'echo "  完成"',
    'echo ""',
    '',
    'echo "[3/4] 写入 auth-profiles.json..."',
    'AUTH_DIR="$HOME/.openclaw/agents/main/agent"',
    'mkdir -p "$AUTH_DIR"',
  ]);
  // Build the JSON content for auth-profiles.json
  var json = '{\\"anthropic\\":{\\"apiKey\\":\\"'+antKey+'\\"';
  if(base) json += ',\\"baseUrl\\":\\"'+base+'\\"';
  json += '}';
  if(codexKey) json += ',\\"codex\\":{\\"apiKey\\":\\"'+codexKey+'\\"}';
  json += '}';
  s=s.concat([
    'echo "'+json+'" | python3 -m json.tool > "$AUTH_DIR/auth-profiles.json" 2>/dev/null || echo \''+json.replace(/\\"/g,'"')+'\' > "$AUTH_DIR/auth-profiles.json"',
    'cat "$AUTH_DIR/auth-profiles.json"',
    'echo ""',
    'echo "  完成"',
    'echo ""',
    '',
    'echo "[4/4] 启动 OpenClaw..."',
    'openclaw gateway stop 2>/dev/null',
    'sleep 1',
    'openclaw daemon install 2>/dev/null',
    'openclaw gateway start 2>/dev/null &',
    'sleep 3',
    'echo ""',
    'echo "========================================"',
    'echo "  部署完成！正在打开 OpenClaw..."',
    'echo "========================================"',
    'echo ""',
    'openclaw tui || echo "  请打开新终端运行: openclaw tui"',
  ]);
  return s.join('\n');
}
function genWin(antKey,codexKey,base){
  var authJson='{ "anthropic": { "apiKey": "'+antKey+'"';
  if(base) authJson+=', "baseUrl": "'+base+'"';
  authJson+=' }';
  if(codexKey) authJson+=', "codex": { "apiKey": "'+codexKey+'" }';
  authJson+=' }';
  var s=[
    '@echo off','chcp 65001 >nul','title OpenClaw 一键部署',
    'echo.','echo ========================================',
    'echo   OpenClaw 一键部署 (Windows)',
    'echo ========================================','echo.',
    '',
    'echo [1/4] 设置环境变量...',
    'setx ANTHROPIC_API_KEY "'+antKey+'" >nul',
    'set "ANTHROPIC_API_KEY='+antKey+'"',
  ];
  if(codexKey){
    s.push('setx CODEX_API_KEY "'+codexKey+'" >nul');
    s.push('set "CODEX_API_KEY='+codexKey+'"');
  }
  if(base){
    s.push('setx ANTHROPIC_BASE_URL "'+base+'" >nul');
    s.push('set "ANTHROPIC_BASE_URL='+base+'"');
  }
  s=s.concat([
    'echo   完成','echo.',
    '',
    'echo [2/4] 安装 OpenClaw...',
    'powershell -ExecutionPolicy Bypass -Command "iwr -useb https://openclaw.ai/install.ps1 | iex"',
    'echo   完成','echo.',
    '',
    'echo [3/4] 写入 auth-profiles.json...',
    'set "AUTH_DIR=%USERPROFILE%\\.openclaw\\agents\\main\\agent"',
    'if not exist "%AUTH_DIR%" mkdir "%AUTH_DIR%"',
    'echo '+authJson+' > "%AUTH_DIR%\\auth-profiles.json"',
    'echo   完成','echo.',
    '',
    'echo [4/4] 启动 OpenClaw...',
    'openclaw gateway stop 2>nul',
    'timeout /t 1 /nobreak >nul',
    'openclaw daemon install 2>nul',
    'start "" openclaw gateway start',
    'timeout /t 3 /nobreak >nul',
    'openclaw tui',
    'pause',
  ]);
  return s.join('\r\n');
}
function generate(){
  var msg=document.getElementById('msg'),guide=document.getElementById('guide');
  var antKey=document.getElementById('antkey').value.trim();
  var codexKey=document.getElementById('codexkey').value.trim();
  var base=document.getElementById('baseurl').value.trim().replace(/\/$/,'');
  if(!antKey){msg.className='msg err';msg.textContent='请输入 Anthropic API Key';return}
  if(isMac){
    var script=genMac(antKey,codexKey,base);
    var encoded=btoa(unescape(encodeURIComponent(script)));
    var cmd='echo '+encoded+' | base64 -d > /tmp/oc-install.sh && bash /tmp/oc-install.sh';
    guide.innerHTML='<h3>只需三步</h3><ol>'+
      '<li>按 <b>Command+空格</b>，输入 <b>Terminal</b>，回车打开终端</li>'+
      '<li>点下面的"复制"按钮</li>'+
      '<li>在终端里 <b>Command+V</b> 粘贴，按回车即可</li></ol>'+
      '<div class="cmd-box"><span id="mac-cmd" style="user-select:all;overflow:hidden;max-height:60px">'+cmd+'</span>'+
      '<button onclick="copyCmd(this)">复制</button></div>'+
      '<p class="tip">安装+配置全自动完成，终端里不需要输入任何东西</p>';
    guide.style.display='block';
    msg.className='msg ok';msg.textContent='命令已生成，复制到终端即可!';
  }else{
    var script=genWin(antKey,codexKey,base);
    var blob=new Blob([script],{type:'application/octet-stream'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download='install-openclaw.bat';a.click();
    guide.innerHTML='<h3>只需两步</h3><ol>'+
      '<li>找到下载的 <b>install-openclaw.bat</b></li>'+
      '<li>双击运行即可，全自动安装+配置</li></ol>'+
      '<p class="tip">安装+配置全自动完成，不需要额外操作</p>';
    guide.style.display='block';
    msg.className='msg ok';msg.textContent='安装文件已下载!';
  }
}
</script>
</body>
</html>
